version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: dropoff_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 12

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  app:
    build: .
    environment:
      DB_URL: postgresql://postgres:postgres@db:5432/dropoff_test
      REDIS_URL: redis://redis:6379
      SESSION_SECRET_KEY: ci-session-secret
      JWT_SECRET_KEY: ci-jwt-secret
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash -lc "python -m pip install -r requirements.txt && python -m pip install -r e2e/requirements.txt || true && python -m playwright install --with-deps || true && pytest -q"
    tty: true
