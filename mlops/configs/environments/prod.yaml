environment: prod

app:
  debug: false
  api_host: 0.0.0.0
  api_port: 5000

data:
  use_sample_data: false
  sample_size: null

training:
  run_xgboost: true
  random_seed: 42

monitoring:
  enable_metrics: true
  enable_drift_checks: true
  log_level: WARNING
  monitor_worker_interval_sec: 120
  alert_throttle_minutes: 30

database:
  type: postgresql
  host: localhost
  port: 5432
  user: prod_user
  password: prod_password
  database: dropoff_detection_prod
  url: ""
  echo: false

security:
  require_auth: true
  api_key: ""
  api_key_env_var: API_KEY
  enable_rate_limiting: true
