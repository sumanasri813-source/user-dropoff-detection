name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-compose-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Start docker-compose services and run tests
        run: |
          docker compose -f docker-compose.ci.yml up --build --abort-on-container-exit --remove-orphans
          EXIT_CODE=$(docker inspect app --format='{{.State.ExitCode}}' 2>/dev/null || echo 0)
          docker compose -f docker-compose.ci.yml down
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "Tests failed in app container (exit $EXIT_CODE)"
            exit $EXIT_CODE
          fi
