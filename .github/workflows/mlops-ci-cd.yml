name: MLOps CI/CD Pipeline

on:
  push:
    branches: ["main", "develop", "feature/**", "detection"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test Stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-demo.txt

      - name: Run unit tests (contract and integration)
        run: |
          python -m unittest discover tests/ -v

      - name: Run tests
        run: pytest -q

      - name: Run security contract gate
        run: |
          pytest tests/contract/test_predict_contract.py tests/contract/test_crud_operations.py -q

      - name: Run static import checks
        run: |
          python -m compileall src

      - name: Show runtime environment
        run: |
          python - <<'PY'
          from src.utils.config_loader import load_config
          cfg = load_config('config.yaml')
          print('Selected env:', cfg.get('runtime', {}).get('environment'))
          print('Env config file:', cfg.get('runtime', {}).get('environment_config_path'))
          PY

      - name: Run smoke data pipeline
        run: |
          python -m src.data.run_data_step
          test -f data/processed/clean_user_data.csv

  train:
    name: Train Stage
    runs-on: ubuntu-latest
    needs: [test]
    env:
      APP_ENV: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'develop' && 'staging' || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-demo.txt

      - name: Run feature engineering and training
        run: |
          python -m src.data.run_data_step
          python -m src.features.build_features
          python -m src.models.train_model

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          if-no-files-found: error
          path: |
            models/*.pkl
            results/model_comparison.csv
            results/model_metrics.txt
            results/training_summary.json

  evaluate:
    name: Evaluate Stage
    runs-on: ubuntu-latest
    needs: [train]
    env:
      APP_ENV: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'develop' && 'staging' || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-demo.txt

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-artifacts
          path: .

      - name: Rebuild data and evaluate model
        run: |
          python -m src.data.run_data_step
          python -m src.features.build_features
          test -f models/final_model.pkl
          python -m src.evaluation.evaluate_model

      - name: Quality gates
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          metrics = json.loads(Path('results/evaluation_metrics.json').read_text(encoding='utf-8'))
          m = metrics.get('metrics', {})

          min_roc_auc = 0.75
          min_f1 = 0.50

          roc_auc = float(m.get('roc_auc', 0))
          f1 = float(m.get('f1', 0))

          if roc_auc < min_roc_auc:
              raise SystemExit(f'Quality gate failed: roc_auc {roc_auc:.4f} < {min_roc_auc:.2f}')
          if f1 < min_f1:
              raise SystemExit(f'Quality gate failed: f1 {f1:.4f} < {min_f1:.2f}')

          print(f'Quality gate passed: roc_auc={roc_auc:.4f}, f1={f1:.4f}')
          PY

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-artifacts
          if-no-files-found: error
          path: |
            results/evaluation_summary.txt
            results/evaluation_metrics.json
            results/threshold_analysis.csv

  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: [evaluate]
    if: github.ref_name != 'main' && github.ref_name != 'develop' && github.ref_name != 'detection' && github.event_name != 'pull_request'
    env:
      APP_ENV: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          name: evaluation-artifacts
          path: results

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-artifacts
          path: .

      - name: Build deployment package
        run: |
          mkdir -p dist
          test -f models/final_model.pkl
          test -f results/evaluation_metrics.json
          tar -czf dist/user-dropoff-mlops-dev.tar.gz src models config.yaml requirements.txt mlops results

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v4
        with:
          name: deployment-bundle-dev
          path: dist/user-dropoff-mlops-dev.tar.gz

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [evaluate]
    if: (github.ref_name == 'develop' || github.ref_name == 'detection') && github.event_name != 'pull_request'
    env:
      APP_ENV: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          name: evaluation-artifacts
          path: results

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-artifacts
          path: .

      - name: Build deployment package
        run: |
          mkdir -p dist
          test -f models/final_model.pkl
          test -f results/evaluation_metrics.json
          tar -czf dist/user-dropoff-mlops-staging.tar.gz src models config.yaml requirements.txt mlops results

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v4
        with:
          name: deployment-bundle-staging
          path: dist/user-dropoff-mlops-staging.tar.gz

  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [evaluate]
    if: (github.ref_name == 'main' || github.ref_name == 'detection') && github.event_name != 'pull_request'
    env:
      APP_ENV: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          name: evaluation-artifacts
          path: results

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-artifacts
          path: .

      - name: Build deployment package
        run: |
          mkdir -p dist
          test -f models/final_model.pkl
          test -f results/evaluation_metrics.json
          tar -czf dist/user-dropoff-mlops-prod.tar.gz src models config.yaml requirements.txt mlops results

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v4
        with:
          name: deployment-bundle-prod
          path: dist/user-dropoff-mlops-prod.tar.gz