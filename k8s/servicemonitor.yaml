apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: user-dropoff-api
  namespace: user-dropoff
  labels:
    app: user-dropoff-api
spec:
  selector:
    matchLabels:
      app: user-dropoff-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
