apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-dropoff-api
  namespace: user-dropoff
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-dropoff-api
  namespace: user-dropoff
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-dropoff-api
  namespace: user-dropoff
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: user-dropoff-api
subjects:
- kind: ServiceAccount
  name: user-dropoff-api
  namespace: user-dropoff
